<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>BLUE MAGIC LAUNDRY TAG PRINTER</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>BLUE MAGIC LAUNDRY TAG PRINTER</h2>

<div class="form">

<label>Order No</label> <input id="orderNo">

<label>Customer Name</label> <input id="customer">

<label>Wash Type</label> <select id="wash">

<option value="DC">DC</option>
<option value="WI">WI</option>
<option value="WF">WF</option>
<option value="SI">SI</option>
</select>

<label>Delivery Date</label> <input id="delivery" type="date">

<label>Total Quantity</label> <input id="qty" type="number">

<label>Starch Quantity</label> <input id="starchQty" type="number" value="0">

</div>

<br>

<button onclick="generateTags()">Generate Tags</button> <button onclick="printTags()">Print</button> <button onclick="refreshPage()">Refresh</button>

<div id="tags"></div>

<script src="script.js"></script>

</body>
</html>
